name: "Repository 举荐 / Repository Recommendation"
description: "向 Best Of Rust 举荐好用的 Rust 项目 / Recommend a Rust project to Best Of Rust"
title: "[举荐] "
labels: ["recommendation"]
body:
  - type: markdown
    attributes:
      value: |
        # Repository 举荐
        *Repository Recommendation*

        你可以使用在此向 Best Of Rust 举荐那些好用的 Rust 项目。
        *You can recommend useful Rust projects to Best Of Rust here.*

  - type: input
    id: repo_url
    attributes:
      label: "1. 这个项目的 GitHub 仓库地址是？\n*1. What is the GitHub repository URL of this project?*"
      placeholder: "https://github.com/owner/repo"
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: "2. 这个项目的应该归属到哪些 Tag 分类下（参考格式：tag1, tag2, tag3...）？\n*2. Which tags should this project belong to (format: tag1, tag2, tag3...)?*"
      placeholder: "cli, web, database"
    validations:
      required: false

  - type: textarea
    id: why_impressed
    attributes:
      label: "3. 这个项目从哪些地方惊艳到你了？简单介绍就行（比如：它对你的影响、帮助……）。\n*3. What impressed you about this project? Briefly describe (e.g., impact/help to you).*"
      placeholder: "例如：它解决了什么问题？为什么比同类更好用？你的使用场景是什么？"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### 感谢你对 Best Of Rust 的支持！
        *Thank you for supporting Best Of Rust!*

        #### 如果你想更进一步，欢迎为本项目提交 PR。
        *If you'd like to go further, PRs are welcome.*
